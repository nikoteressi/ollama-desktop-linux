sonar.projectKey=nikoteressi_alpaka-desktop
sonar.organization=nikoteressi

sonar.sources=src
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.ts,**/*.spec.ts,**/*.test.vue,**/*.spec.vue

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.rust.lcov.reportPaths=src-tauri/coverage-rust/lcov.info
sonar.scm.revision=${env.GITHUB_SHA}

# Exclude app entry points and router config — no testable logic, only framework wiring.
sonar.coverage.exclusions=src/main.ts,src/router/**,src/App.vue
