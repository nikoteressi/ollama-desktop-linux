name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-linux:
    name: Build and Release (Linux)
    runs-on: ubuntu-22.04

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout — full history so changelog generation works correctly  #
      # ------------------------------------------------------------------ #
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      # ------------------------------------------------------------------ #
      # 2. Rust stable with Swatinem cache                                  #
      # ------------------------------------------------------------------ #
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@fcf085fcb4b4b8f63f96906cd713eb52181b5ea4  # stable (2025-04)
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # ------------------------------------------------------------------ #
      # 3. pnpm + Node.js 20                                                #
      # ------------------------------------------------------------------ #
      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda  # v4.1.0
        with:
          version: 9

      - name: Setup Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "20"
          cache: pnpm

      # ------------------------------------------------------------------ #
      # 4. Frontend dependencies                                            #
      # ------------------------------------------------------------------ #
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # ------------------------------------------------------------------ #
      # 5. Tauri v2 Linux system dependencies (Ubuntu 22.04)               #
      # ------------------------------------------------------------------ #
      - name: Install Tauri Linux system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            patchelf \
            libappindicator3-dev \
            libayatana-appindicator3-dev \
            pkg-config

      # ------------------------------------------------------------------ #
      # 6. Build distributable bundles                                      #
      # ------------------------------------------------------------------ #
      - name: Build Tauri application
        run: pnpm tauri build
        env:
          # Tauri reads this for AppImage signing (updater plugin).
          # Set these secrets in repo settings if you enable the updater.
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          CI: true

      # ------------------------------------------------------------------ #
      # 7. Locate built artifacts and compute checksums                     #
      # ------------------------------------------------------------------ #
      - name: Locate artifacts
        id: artifacts
        run: |
          set -euo pipefail
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" ! -name "*.sig" | head -n1)
          DEB=$(find src-tauri/target/release/bundle/deb -name "*.deb" | head -n1)
          echo "appimage=${APPIMAGE}" >> "$GITHUB_OUTPUT"
          echo "deb=${DEB}" >> "$GITHUB_OUTPUT"
          echo "Found AppImage: ${APPIMAGE}"
          echo "Found deb:      ${DEB}"

      - name: Generate SHA256 checksums
        id: checksums
        run: |
          set -euo pipefail
          APPIMAGE="${{ steps.artifacts.outputs.appimage }}"
          DEB="${{ steps.artifacts.outputs.deb }}"
          CHECKSUM_FILE="sha256sums.txt"
          sha256sum "${APPIMAGE}" "${DEB}" > "${CHECKSUM_FILE}"
          cat "${CHECKSUM_FILE}"
          echo "checksum_file=${CHECKSUM_FILE}" >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------ #
      # 8. Create GitHub Release and upload assets                          #
      # ------------------------------------------------------------------ #
      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631  # v2.2.2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Alpaka Desktop ${{ github.ref_name }}"
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            ${{ steps.artifacts.outputs.appimage }}
            ${{ steps.artifacts.outputs.deb }}
            ${{ steps.checksums.outputs.checksum_file }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
