name: CI

on:
  push:
    branches: [main, develop, release/*, hotfix/*]
  pull_request:
    branches: [main, develop, release/*, hotfix/*]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────── #
  # Detect which parts of the codebase changed (PR only; push = run all)   #
  # ─────────────────────────────────────────────────────────────────────── #
  changes:
    name: Detect Changes
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pull-requests: read
    outputs:
      rust: ${{ steps.set.outputs.rust }}
      frontend: ${{ steps.set.outputs.frontend }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            rust:
              - 'src-tauri/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            frontend:
              - 'src/**'
              - 'e2e/**'
              - 'index.html'
              - 'vite.config.ts'
              - 'playwright.config.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - '.github/**'
              - 'CHANGELOG.md'

      - name: Set change flags
        id: set
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "rust=true"     >> "$GITHUB_OUTPUT"
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "rust=${{ steps.filter.outputs.rust }}"         >> "$GITHUB_OUTPUT"
            echo "frontend=${{ steps.filter.outputs.frontend }}" >> "$GITHUB_OUTPUT"
          fi

  # ─────────────────────────────────────────────────────────────────────── #
  # Spell check — fast, always runs                                         #
  # ─────────────────────────────────────────────────────────────────────── #
  typos:
    name: Spell Check (typos)
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: crate-ci/typos@c96c46fae465ab9e3607401d9ce93d75e7998023 # v1
        with:
          config: _typos.toml
          files: ./src ./src-tauri/src docs

  # ─────────────────────────────────────────────────────────────────────── #
  # Security audit — cargo-audit + cargo-deny + pnpm audit                 #
  # ─────────────────────────────────────────────────────────────────────── #
  security-audit:
    name: Security Audit
    runs-on: ubuntu-22.04
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # @stable (master)
        with:
          toolchain: stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri -> target
          shared-key: ci

      - name: Install audit tools
        uses: taiki-e/install-action@1f2425cdb59f8fffb99ee16a5968edf6f57a2b93 # v2
        with:
          tool: cargo-audit,cargo-deny

      - name: Run cargo audit
        # --deny warnings would block on unmaintained GTK3 transitive deps
        # (atk, gdk-sys, etc.) which Tauri cannot yet update.
        run: cargo audit
        working-directory: src-tauri

      - name: Run cargo deny
        run: cargo deny check
        working-directory: src-tauri

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install npm dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --audit-level=high --prod

  # ─────────────────────────────────────────────────────────────────────── #
  # MSRV — verify rust-version = "1.88.0" from Cargo.toml compiles         #
  # 1.88.0 is the minimum because transitive deps use Cargo edition2024,   #
  # which was stabilised in Rust 1.85.                                      #
  # ─────────────────────────────────────────────────────────────────────── #
  msrv-check:
    name: MSRV Check (1.88.0)
    runs-on: ubuntu-22.04
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust 1.88.0 (MSRV)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # @stable (master)
        with:
          toolchain: "1.88.0"

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config

      - name: Cache Rust artifacts (MSRV)
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri -> target
          shared-key: msrv

      - name: Cargo check at MSRV
        run: cargo check --locked
        working-directory: src-tauri

  # ─────────────────────────────────────────────────────────────────────── #
  # Build check — format, lint, typecheck                                   #
  # ─────────────────────────────────────────────────────────────────────── #
  build-check:
    name: Build Check
    runs-on: ubuntu-22.04
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.frontend == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install Rust stable
        if: needs.changes.outputs.rust == 'true'
        id: rust-toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # @stable (master)
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Install Linux system dependencies
        if: needs.changes.outputs.rust == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config

      - name: Cache Rust artifacts
        if: needs.changes.outputs.rust == 'true'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri -> target
          shared-key: ci

      - name: Cargo check
        if: needs.changes.outputs.rust == 'true'
        run: cargo check --locked
        working-directory: src-tauri

      - name: Cargo fmt
        if: needs.changes.outputs.rust == 'true'
        run: cargo fmt -- --check
        working-directory: src-tauri

      - name: Cargo clippy
        if: needs.changes.outputs.rust == 'true'
        run: cargo clippy -- -D warnings
        working-directory: src-tauri

      - name: Setup pnpm
        if: needs.changes.outputs.frontend == 'true'
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Setup Node.js
        if: needs.changes.outputs.frontend == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install npm dependencies
        if: needs.changes.outputs.frontend == 'true'
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        if: needs.changes.outputs.frontend == 'true'
        run: pnpm typecheck

      - name: ESLint check
        if: needs.changes.outputs.frontend == 'true'
        run: pnpm lint:check

      - name: Prettier check
        if: needs.changes.outputs.frontend == 'true'
        run: pnpm format:check

      - name: Check CHANGELOG updated
        if: github.event_name == 'pull_request'
        env:
          PR_LABELS: ${{ toJson(github.event.pull_request.labels) }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail

          git fetch origin "${BASE_REF}" --depth=1
          CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD")

          if echo "$CHANGED" | grep -Fxq "CHANGELOG.md"; then
            echo "CHANGELOG.md updated."
            exit 0
          fi

          ADVISORY=$(echo "$PR_LABELS" | jq -r '.[].name' | grep -E '^type: (ci|docs)$' | head -1 || true)

          if [[ -n "$ADVISORY" ]]; then
            echo "WARNING: CHANGELOG.md not updated, but PR is labeled '${ADVISORY}' — advisory only."
            exit 0
          fi

          echo "ERROR: CHANGELOG.md not updated."
          echo "Please add an entry under [Unreleased] in CHANGELOG.md."
          echo "For CI-only or docs-only PRs, add the 'type: ci' or 'type: docs' label to suppress this check."
          exit 1

  # ─────────────────────────────────────────────────────────────────────── #
  # Test + Coverage — runs tests ONCE with instrumentation (not twice)      #
  # ─────────────────────────────────────────────────────────────────────── #
  test-and-coverage:
    name: Test and Coverage
    runs-on: ubuntu-22.04
    needs: [changes, build-check]
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.frontend == 'true'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install Rust stable
        if: needs.changes.outputs.rust == 'true'
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # @stable (master)
        with:
          toolchain: stable

      - name: Install Linux system dependencies
        if: needs.changes.outputs.rust == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config

      - name: Cache Rust artifacts
        if: needs.changes.outputs.rust == 'true'
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri -> target
          shared-key: ci

      - name: Install coverage + test tools
        if: needs.changes.outputs.rust == 'true'
        uses: taiki-e/install-action@1f2425cdb59f8fffb99ee16a5968edf6f57a2b93 # v2
        with:
          tool: cargo-llvm-cov,cargo-nextest

      - name: Run Rust tests with coverage (nextest)
        if: needs.changes.outputs.rust == 'true'
        run: |
          mkdir -p coverage-rust
          cargo llvm-cov nextest --no-report --workspace --locked
          cargo llvm-cov report --lcov --output-path coverage-rust/lcov.info
          cargo llvm-cov report --html --output-dir coverage-rust/html
        working-directory: src-tauri

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install npm dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest with coverage
        if: needs.changes.outputs.frontend == 'true'
        run: pnpm test:coverage

      - name: Run Vitest (Rust-only change — no frontend coverage needed)
        if: needs.changes.outputs.rust == 'true' && needs.changes.outputs.frontend != 'true'
        run: pnpm test

      - name: SonarCloud scan
        if: |
          (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) &&
          (needs.changes.outputs.rust == 'true' || needs.changes.outputs.frontend == 'true')
        uses: SonarSource/sonarcloud-github-action@383f7e52eae3ab0510c3cb0e7d9d150bbaeab838 # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Upload TypeScript coverage report
        if: needs.changes.outputs.frontend == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: vitest-coverage
          path: coverage/
          retention-days: 30

      - name: Upload Rust coverage report
        if: needs.changes.outputs.rust == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cargo-coverage
          path: src-tauri/coverage-rust/html/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────── #
  # E2E — Playwright tests (browser-mode, Tauri IPC mocked)                #
  # ─────────────────────────────────────────────────────────────────────── #
  e2e:
    name: E2E Tests
    runs-on: ubuntu-22.04
    needs: [changes, build-check]
    if: needs.changes.outputs.frontend == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: Run Playwright E2E tests
        run: pnpm exec playwright test
        continue-on-error: true
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
