name: Feature Request
description: Suggest a new feature or improvement for Alpaka Desktop.
title: "[Feature]: "
labels: ["type: feature", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe your idea clearly so we can evaluate and prioritize it.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or limitation you are running into.
      placeholder: "I find it frustrating when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you want to happen. Be as specific as possible.
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: How important is this to you?
      description: Is this a "nice to have" or a blocker for your workflow?
      options:
        - Critical (I can't use the app without it)
        - High (Significant pain point)
        - Medium (Would improve my workflow)
        - Low (Minor convenience)
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds or considered other approaches?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Chat / Streaming
        - Model Management
        - Multi-Host Support
        - Settings / Configuration
        - UI / UX
        - Performance
        - Linux Integration (tray, notifications, systemd)
        - Auth / Security
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, mockups, links to similar features in other apps, etc.
    validations:
      required: false
