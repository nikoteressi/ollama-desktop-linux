# typos spell-check configuration for alpaka-desktop
# https://github.com/crate-ci/typos

[default.extend-words]
# "PNGs" (plural of PNG) is parsed as "PN" by typos — suppress the false positive.
PN = "PN"
# "&lt;thi" in docs/dev/backend.md is a partial HTML entity example showing cross-chunk
# boundary splitting of the <think> tag — not a misspelling.
thi = "thi"

[files]
extend-exclude = [
    "pnpm-lock.yaml",
    "Cargo.lock",
    "*.png",
    "*.ico",
    "*.icns",
    "dist/",
    "node_modules/",
    "target/",
    "coverage/",
]
