// ── Utilities ─────────────────────────────────────────────────────────────────

function fmtBytes(b) {
  if (!b) return 'cloud';
  if (b>1e9) return (b/1e9).toFixed(1)+' GB';
  if (b>1e6) return (b/1e6).toFixed(0)+' MB';
  return b+' B';
}

function sizeGB(s) {
  if (!s) return 0;
  const n = parseFloat(s);
  if (s.includes('GB')) return n;
  if (s.includes('MB')) return n/1024;
  return 0;
}

// ── Shared UI atoms ───────────────────────────────────────────────────────────

function IconBtn({ children, onClick, title, active }) {
  const [hov,setHov] = React.useState(false);
  return (
    <button onClick={onClick} title={title}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{ width:32,height:32,borderRadius:6,border:'none', background:(hov||active)?'#2a2a2a':'transparent',
        color:(hov||active)?'#e8e8e8':'#666', display:'flex',alignItems:'center',justifyContent:'center',
        cursor:'pointer',flexShrink:0,transition:'background 0.1s,color 0.1s', fontFamily:'inherit' }}>
      {children}
    </button>
  );
}

function Toggle({ on, onChange }) {
  return (
    <div onClick={()=>onChange&&onChange(!on)}
      style={{ width:40,height:22,borderRadius:11,background:on?'#4a7fd4':'#333',
        border:`1px solid ${on?'#4a7fd4':'#444'}`, position:'relative',cursor:'pointer',
        transition:'background 0.15s',flexShrink:0 }}>
      <div style={{ width:16,height:16,borderRadius:'50%',background:'#e8e8e8',
        position:'absolute',top:2,left:on?20:2,transition:'left 0.15s' }}/>
    </div>
  );
}

function CopyBtn({ text }) {
  const [ok,setOk] = React.useState(false);
  return (
    <button onClick={()=>{navigator.clipboard?.writeText(text||'');setOk(true);setTimeout(()=>setOk(false),1500);}}
      style={{ background:'none',border:'none',color:ok?'#5bc97a':'#555',cursor:'pointer',
        padding:'3px 5px',borderRadius:4,display:'flex',alignItems:'center',transition:'color 0.15s' }}>
      {ok
        ? <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M20 6L9 17l-5-5"/></svg>
        : <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>}
    </button>
  );
}

}

function Shell({ children, activeView, setActiveView, activeConvId, setActiveConvId, newChat }) {

    const m={};

  },[]);

  return (
    <div style={{ display:'flex',height:'100vh',background:'#1a1a1a',color:'#e8e8e8',
      fontFamily:"'Segoe UI',system-ui,sans-serif",overflow:'hidden' }}>
      {/* Icon strip */}
      <div style={{ width:48,display:'flex',flexDirection:'column',alignItems:'center',
        paddingTop:8,gap:2,flexShrink:0,borderRight:'1px solid #242424' }}>
        <IconBtn onClick={()=>setOpen(o=>!o)} title="Toggle sidebar" active={open}>
          <SidebarToggleIcon/>
        </IconBtn>
        <IconBtn onClick={newChat} title="New Chat">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
            <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
          </svg>
        </IconBtn>
      </div>

      {/* Sidebar */}
      <div style={{ width:open?220:0,overflow:'hidden',transition:'width 0.18s ease',
        flexShrink:0,display:'flex',flexDirection:'column',
        borderRight:open?'1px solid #242424':'none',background:'#1a1a1a' }}>
        <div style={{ width:220,display:'flex',flexDirection:'column',height:'100%',paddingTop:4 }}>
          {NAV.map(item=>(
            <div key={item.id} onClick={()=>setActiveView(item.id)}
              style={{ display:'flex',alignItems:'center',gap:10,padding:'7px 12px',
                margin:'1px 6px',borderRadius:6,cursor:'pointer',userSelect:'none',
                background:activeView===item.id?'#2a2a2a':'transparent',
                color:activeView===item.id?'#e8e8e8':'#888',fontSize:13,
                fontWeight:activeView===item.id?500:400,transition:'background 0.1s,color 0.1s' }}>
              <span style={{ flexShrink:0,opacity:activeView===item.id?1:0.7 }}>{item.icon()}</span>
              <span style={{ whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis' }}>{item.label}</span>
            </div>
          ))}
          {activeView==='chat' && (
            <div style={{ flex:1,overflowY:'auto',marginTop:8,paddingBottom:16 }}>
              {Object.entries(grouped).map(([group,convos])=>(
                <div key={group}>
                  <div style={{ padding:'6px 12px 3px',fontSize:11,color:'#555',fontWeight:500 }}>{group}</div>
                  {convos.map(c=>(
                    <div key={c.id} onClick={()=>setActiveConvId(c.id)}
                      style={{ padding:'5px 12px',fontSize:13,
                        color:activeConvId===c.id?'#e8e8e8':'#777',
                        background:activeConvId===c.id?'#2a2a2a':'transparent',
                        borderRadius:6,margin:'1px 6px',cursor:'pointer',
                        whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',
                        transition:'background 0.1s' }}>
                      {c.title}
                    </div>
                  ))}
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      <div style={{ flex:1,overflow:'hidden',display:'flex',flexDirection:'column' }}>
        {children}
      </div>
    </div>
  );
}

// ── Chat ──────────────────────────────────────────────────────────────────────

function ThinkBlock({ content, thinkTime }) {
  const [open,setOpen] = React.useState(false);
  return (
    <div style={{ marginBottom:10 }}>
      <button onClick={()=>setOpen(o=>!o)}
        style={{ display:'flex',alignItems:'center',gap:6,background:'none',border:'none',
          color:'#888',fontSize:13,cursor:'pointer',padding:'2px 0',fontFamily:'inherit' }}>
        <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor"
          strokeWidth="1.8" strokeLinecap="round"
          style={{ transform:open?'rotate(90deg)':'rotate(0)',transition:'transform 0.15s' }}>
          <path d="M4 2l4 4-4 4"/>
        </svg>
        <span>Thought for {thinkTime} seconds</span>
      </button>
      {open && (
        <div style={{ marginTop:8,padding:'10px 14px',background:'#222',borderRadius:8,
          fontSize:13,color:'#888',lineHeight:1.6,whiteSpace:'pre-wrap',
          maxHeight:240,overflowY:'auto',border:'1px solid #2a2a2a' }}>
          {content}
        </div>
      )}

  );
}

function Message({ msg }) {
  if (msg.role==='user') return (
    <div style={{ display:'flex',justifyContent:'flex-end',padding:'4px 24px 6px' }}>
      <div style={{ background:'#2d2d2d',borderRadius:18,borderTopRightRadius:4,
        padding:'8px 14px',fontSize:14,color:'#e8e8e8',maxWidth:'72%',lineHeight:1.55 }}>
        {msg.content}
      </div>
    </div>
  );
  return (
    <div style={{ padding:'6px 24px 12px' }}>
      {msg.thinking && <ThinkBlock content={msg.thinking} thinkTime={msg.thinkTime}/>}
      <div style={{ fontSize:14,color:'#e8e8e8',lineHeight:1.75,whiteSpace:'pre-wrap' }}>{msg.content}</div>
      <div style={{ marginTop:6 }}><CopyBtn text={msg.content}/></div>
    </div>
  );
}

function ModelDropdown({ model, setModel, onClose }) {
  const [q,setQ] = React.useState('');
  const list = MODELS_LIST.filter(m=>m.toLowerCase().includes(q.toLowerCase()));
  const ref = React.useRef(null);
  React.useEffect(()=>{
    const h=(e)=>{ if(ref.current&&!ref.current.contains(e.target)) onClose(); };
    document.addEventListener('mousedown',h);
    return ()=>document.removeEventListener('mousedown',h);
  },[onClose]);
  return (
    <div ref={ref} style={{ position:'absolute',bottom:'100%',right:0,marginBottom:6,width:260,
      background:'#242424',border:'1px solid #333',borderRadius:10,overflow:'hidden',
      boxShadow:'0 8px 32px rgba(0,0,0,.55)',zIndex:100 }}>
      <div style={{ padding:'8px 10px',borderBottom:'1px solid #2a2a2a' }}>
        <input autoFocus value={q} onChange={e=>setQ(e.target.value)}
          placeholder="Find model..."
          style={{ width:'100%',background:'#1e1e1e',border:'none',borderRadius:6,
            padding:'5px 10px',fontSize:12.5,color:'#e8e8e8',outline:'none',
            fontFamily:'inherit',boxSizing:'border-box' }}/>
      </div>
      <div style={{ maxHeight:220,overflowY:'auto' }}>
        {list.map(m=>(
          <div key={m} onClick={()=>{ setModel(m); onClose(); }}
            style={{ display:'flex',alignItems:'center',justifyContent:'space-between',
              padding:'7px 14px',fontSize:12.5,color:m===model?'#e8e8e8':'#aaa',
              background:m===model?'#2a2a2a':'transparent',cursor:'pointer' }}
            onMouseEnter={e=>e.currentTarget.style.background='#2a2a2a'}
            onMouseLeave={e=>e.currentTarget.style.background=m===model?'#2a2a2a':'transparent'}>
            <span>{m}</span>
            {m.includes(':cloud')&&(
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#666" strokeWidth="2" strokeLinecap="round">
                <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9z"/>
              </svg>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

function ChatInput({ onSend, model, setModel }) {
  const [text,setText] = React.useState('');
  const [showModel,setShowModel] = React.useState(false);
  const [showSP,setShowSP] = React.useState(false);
  const [sp,setSp] = React.useState('');
  const taRef = React.useRef(null);

  const handleKey=(e)=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); submit(); } };
  const submit=()=>{ if(text.trim()){ onSend(text); setText(''); } };

  React.useEffect(()=>{
    if(taRef.current){
      taRef.current.style.height='auto';
      taRef.current.style.height=Math.min(taRef.current.scrollHeight,160)+'px';
    }
  },[text]);

  return (
    <div style={{ padding:'0 0 18px' }}>
      {showSP && (
        <div style={{ marginBottom:6,padding:'10px 14px',background:'#222',borderRadius:10,border:'1px solid #2e2e2e' }}>
          <div style={{ fontSize:10,color:'#555',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:6,fontWeight:600 }}>System Prompt</div>
          <textarea value={sp} onChange={e=>setSp(e.target.value)}
            placeholder="You are a helpful assistant..." rows={3}
            style={{ width:'100%',background:'#1a1a1a',border:'1px solid #2e2e2e',borderRadius:7,
              padding:'7px 10px',fontSize:12.5,color:'#e8e8e8',resize:'none',outline:'none',

function ChatView({ convId }) {
  const [messages,setMessages] = React.useState(convId?DEMO_MESSAGES:[]);
  const [model,setModel] = React.useState('kimi-k2.5:cloud');
  const [streaming,setStreaming] = React.useState(false);
  const bottomRef = React.useRef(null);
  React.useEffect(()=>{ setMessages(convId?DEMO_MESSAGES:[]); },[convId]);
  React.useEffect(()=>{ bottomRef.current?.scrollIntoView({block:'end'}); },[messages]);

  const handleSend=(text)=>{
    setMessages(m=>[...m,{role:'user',content:text}]);
    setStreaming(true);
    setTimeout(()=>{
      setMessages(m=>[...m,{ role:'assistant', thinking:'Hmm, let me think about this...', thinkTime:1.2,
        content:'I received: "'+text+'"\n\nThis is a demo prototype. In the real app I\'d respond using '+model+'.\n\nHow can I help further?' }]);
      setStreaming(false);
    },1600);
  };

  return (
    <div style={{ display:'flex',flexDirection:'column',height:'100%',background:'#1a1a1a' }}>
      <div style={{ flex:1,overflowY:'auto',display:'flex',flexDirection:'column' }}>
        {messages.length===0 ? (
          <div style={{ flex:1,display:'flex',alignItems:'center',justifyContent:'center' }}>
            <LlamaCircle size={52}/>
          </div>
        ) : (
          <div style={{ maxWidth:760,width:'100%',margin:'0 auto',paddingTop:24,paddingBottom:8 }}>
            {messages.map((m,i)=><Message key={i} msg={m}/>)}
            {streaming && (
              <div style={{ padding:'4px 24px' }}>
                <div style={{ display:'flex',gap:5,alignItems:'center',height:24 }}>
                  {[0,1,2].map(i=>(
                    <div key={i} style={{ width:6,height:6,borderRadius:'50%',background:'#555',
                      animation:`bounce 1.2s ${i*0.2}s infinite` }}/>
                  ))}
                </div>
              </div>
            )}
            <div ref={bottomRef}/>
          </div>
        )}
      </div>
      <div style={{ maxWidth:760,width:'100%',margin:'0 auto',padding:'0 24px',boxSizing:'border-box' }}>
        <ChatInput onSend={handleSend} model={model} setModel={setModel}/>
      </div>
    </div>
  );
}

function ModelsView() {
  const [pulling,setPulling] = React.useState({});
  const [models,setModels] = React.useState(INSTALLED_MODELS);
  const intervals = React.useRef({});

  const handlePull=(name)=>{
    if(pulling[name]) return;
    setPulling(p=>({...p,[name]:{status:'pulling manifest',percent:0}}));
    let pct=0;
    intervals.current[name]=setInterval(()=>{
      pct+=Math.random()*7+2;
      if(pct>=100){
        pct=100;
        clearInterval(intervals.current[name]);
        delete intervals.current[name];
        setPulling(p=>{ const n={...p}; delete n[name]; return n; });
        setModels(m=>[...m,{name,size:4700000000,paramSize:'?',quant:'Q4_K_M',modified:new Date().toISOString().slice(0,10)}]);
      } else {
        setPulling(p=>({...p,[name]:{status:'downloading',percent:pct}}));
      }
    },280);
  };

  React.useEffect(()=>()=>Object.values(intervals.current).forEach(clearInterval),[]);

  return (
    <div style={{ height:'100%',overflowY:'auto',padding:'20px 24px',background:'#1a1a1a' }}>
      <div style={{ maxWidth:820,margin:'0 auto' }}>
        <LibrarySearch onPull={handlePull}/>
        {Object.keys(pulling).length>0&&(
          <div style={{ marginBottom:12,display:'flex',flexDirection:'column',gap:6 }}>
            {Object.entries(pulling).map(([name,p])=>(
              <div key={name} style={{ background:'#1a1a1a',border:'1px solid #2a2a2a',borderRadius:8,padding:'10px 14px' }}>
                <div style={{ display:'flex',justifyContent:'space-between',marginBottom:7 }}>
                  <span style={{ fontSize:13,fontWeight:500,color:'#e8e8e8' }}>{name}</span>
                  <span style={{ fontSize:11.5,color:'#888',fontFamily:'monospace' }}>{p.status} {p.percent>0?Math.round(p.percent)+'%':''}</span>
                </div>
                <div style={{ height:4,background:'#2a2a2a',borderRadius:2,overflow:'hidden' }}>
                  <div style={{ height:'100%',background:'#e8e8e8',borderRadius:2,width:`${p.percent}%`,transition:'width 0.3s ease' }}/>
                </div>
              </div>
            ))}
          </div>
        )}
        <HardwareAnalysis onPull={handlePull}/>
        <div style={{ fontSize:11,color:'#555',fontWeight:500,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:8 }}>Installed</div>
        <div style={{ display:'flex',flexDirection:'column',gap:5 }}>
          {models.map((m,i)=>(
            <div key={i} style={{ display:'flex',alignItems:'center',justifyContent:'space-between',
              padding:'9px 14px',background:'#212121',border:'1px solid #2a2a2a',borderRadius:8 }}>
              <div style={{ display:'flex',alignItems:'center',gap:8 }}>
                <span style={{ fontSize:13.5,color:'#e8e8e8',fontWeight:500 }}>{m.name}</span>
                {m.paramSize&&<span style={{ fontSize:10.5,background:'#252525',color:'#666',padding:'1px 6px',borderRadius:4 }}>{m.paramSize}</span>}
                {m.quant&&<span style={{ fontSize:10.5,background:'#252525',color:'#666',padding:'1px 6px',borderRadius:4 }}>{m.quant}</span>}
                <span style={{ fontSize:11,color:'#555' }}>{fmtBytes(m.size)}</span>
              </div>
              <div style={{ display:'flex',alignItems:'center',gap:8 }}>
                <span style={{ fontSize:11,color:'#444' }}>{m.modified}</span>
                <button onClick={()=>setModels(ms=>ms.filter((_,j)=>j!==i))}
                  style={{ background:'none',border:'none',color:'#444',cursor:'pointer',
                    padding:'2px 4px',borderRadius:4,display:'flex',alignItems:'center' }}>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
                    <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                    <path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                  </svg>
                </button>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

                  padding:'5px 10px',fontSize:12,color:'#e8e8e8',outline:'none',fontFamily:'monospace' }}/>
              <button style={{ padding:'5px 11px',background:'#252525',border:'1px solid #333',borderRadius:6,
                color:'#e8e8e8',fontSize:12,cursor:'pointer',fontFamily:'inherit',
                display:'flex',alignItems:'center',gap:5,flexShrink:0 }}>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                Browse
              </button>
            </div>
          </Row>
          {/* Context length */}
          <div style={{ padding:'11px 14px',background:'#212121',border:'1px solid #2a2a2a',borderRadius:8 }}>
            <div style={{ display:'flex',alignItems:'center',gap:8,marginBottom:6 }}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#888" strokeWidth="2" strokeLinecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
              <span style={{ fontSize:13.5,color:'#e8e8e8',fontWeight:500 }}>Context length</span>
            </div>
            <div style={{ fontSize:12,color:'#4a80d0',marginBottom:10,lineHeight:1.4 }}>
              Context length determines how much of your conversation local LLMs can remember and use to generate responses.
            </div>
            <input type="range" min={0} max={stops.length-1} value={ctxIdx===-1?0:ctxIdx}
              onChange={e=>set('ctxLen',stops[Number(e.target.value)])}
              style={{ width:'100%',cursor:'pointer',accentColor:'#e8e8e8' }}/>
            <div style={{ display:'flex',justifyContent:'space-between',marginTop:4 }}>
              {labels.map((l,i)=><span key={i} style={{ fontSize:10.5,color:'#555' }}>{l}</span>)}
            </div>
          </div>
          {/* Server URL */}
          <Row icon={<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>}
            label="Ollama server URL" sub="Host address for the local Ollama API.">
            <input defaultValue="http://localhost:11434"
              style={{ marginTop:8,width:'100%',background:'#1a1a1a',border:'1px solid #2e2e2e',
                borderRadius:6,padding:'5px 10px',fontSize:12,color:'#e8e8e8',outline:'none',
                fontFamily:'monospace',boxSizing:'border-box' }}/>
          </Row>
          <div style={{ display:'flex',justifyContent:'flex-end',paddingTop:4 }}>
            <button style={{ padding:'7px 18px',background:'#212121',border:'1px solid #2e2e2e',
              borderRadius:8,color:'#e8e8e8',fontSize:13,cursor:'pointer',fontFamily:'inherit' }}>
              Reset to defaults
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Root App ──────────────────────────────────────────────────────────────────

function App() {
  const [view,setView] = React.useState(()=>localStorage.getItem('ollama_view')||'chat');
  const [convId,setConvId] = React.useState(()=>Number(localStorage.getItem('ollama_conv'))||null);

  const setActiveView=(v)=>{ setView(v); localStorage.setItem('ollama_view',v); };
  const setActiveConvId=(id)=>{ setConvId(id); localStorage.setItem('ollama_conv',String(id)); setActiveView('chat'); };
  const newChat=()=>{ setConvId(null); localStorage.removeItem('ollama_conv'); setActiveView('chat'); };

  const mainContent = React.useMemo(()=>{
    if (view==='chat') return <ChatView convId={convId}/>;
    if (view==='launch') return <LaunchView/>;
    if (view==='models') return <ModelsView/>;
    if (view==='settings') return <SettingsView setActiveView={setActiveView}/>;
    return <ChatView convId={convId}/>;
  },[view,convId]);

  return (
    <Shell activeView={view} setActiveView={setActiveView}
      activeConvId={convId} setActiveConvId={setActiveConvId} newChat={newChat}>
      {mainContent}
    </Shell>
  );
}

ReactDOM.createRoot(document.body.appendChild(
  Object.assign(document.createElement('div'),{id:'root',style:'height:100%'})
)).render(<App/>);
</script>
</body>
</html>
